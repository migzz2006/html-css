<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragrafos</title>
</head>
<body>
    <h1>Paragrafos e Quebras de linha</h1>
    <hr>
    <p>
        É possivel escrever um
        paragrafo de qualquer maneira.
        basta inserir o texto entre &lt;p&gt; e &lt;p&gt;
         <!--LESS THAN / Greater THAN -->
    </p>
    <p>
        Se eu precisar de fazer uma quebra do 
        texto num <br> determinado lugar, então temos 
        que usar a tag br.
    </p>
    <p>Vamos adicionar alguns símbolos especiais
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &yen;
        &cent;
        &Delta; 
    </p>
</body>
</html>
